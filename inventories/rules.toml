# One rule per word (scoped by gloss). Together they exercise the engine's main features.

[voicing_assimilation]              # α agreement + a natural-class target/context
words      = ["voicing assimilation"]
name       = "Voicing assimilation"
definition = "[-sonorant] -> [α voice] / _ [-sonorant, α voice]"

[i_umlaut]                          # context-sensitive change across a consonant (the * quantifier)
words      = ["i-umlaut"]
name       = "i-umlaut"
definition = "a -> e / _ [+consonantal]* i"

[final_devoicing]                   # a feature merge conditioned by the word edge (#)
words      = ["final devoicing"]
name       = "Final devoicing"
definition = "[-sonorant] -> [-voice] / _ #"

[intervocalic_loss]                 # deletion (-> the empty string)
words      = ["intervocalic loss"]
name       = "Intervocalic loss"
definition = "h -> ∅ / [+syllabic] _ [+syllabic]"

[epenthesis]                        # insertion (the empty string -> a segment)
words      = ["epenthesis"]
name       = "Epenthesis"
definition = "∅ -> ə / [+consonantal] _ [+consonantal] #"

[degemination]                      # two segments collapse to one (cardinality)
words      = ["degemination"]
name       = "Degemination"
definition = "t t -> t"

[tone_spread]                       # autosegmental: one tone, two anchors
words      = ["tone spread"]
name       = "Tone spread"
definition = "[+syllabic, tone: none] -> [+syllabic, tone: ~1] / [+syllabic, tone: ~1=high] [-syllabic]* _"
application = "left_to_right"

[place_assimilation]                # autosegmental node spread: a nasal copies the next place node
words      = ["place assimilation"]
name       = "Place assimilation"
definition = "[+nasal] -> [oral: ~1] / _ [+consonantal, oral: ~1]"

[tone_stability]                    # autosegmental: a tone outlives its deleted vowel and re-docks
words      = ["tone stability"]
name       = "Tone stability"
definition = "[+syllabic] -> ∅ / [+syllabic] [-syllabic]* _ #"

[tone_delinking]                    # autosegmental: remove an association (tone: none)
words      = ["tone delinking"]
name       = "Tone delinking"
definition = "[+syllabic, tone: high] -> [tone: none] / _ #"

[contour_tone]                      # autosegmental: a level tone becomes a contour (a > b)
words      = ["contour tone"]
name       = "Contour tone"
definition = "[+syllabic, tone: high] -> [tone: 5>3] / _ #"

[stress]                            # the metrical tier: assign primary stress to the first vowel
words      = ["stress"]
name       = "Stress assignment"
definition = "[+syllabic] -> [stress: primary] / # [-syllabic]* _"

[disjunction]                       # a disjunctive context (X | Y)
words      = ["disjunction"]
name       = "Disjunction"
definition = "a -> e / _ (i | j)"

[gemination]                        # a binding + recall: the consonant before /j/ doubles (1= … @1)
words      = ["gemination"]
name       = "Gemination"
definition = "1=[+consonantal] -> @1 @1 / _ j"

[exception]                         # an exception environment (// …): blocked before a high vowel
words      = ["exception"]
name       = "Exception"
definition = "s -> z / [+syllabic] _ [+syllabic] // _ [+syllabic, +high]"

[regressive_raising]                # right-to-left iteration: raising cascades leftward across Cs
words       = ["right-to-left"]
name        = "Right-to-left raising"
definition  = "[+syllabic, +front, !+high, !+low] -> [aperture, high] / _ [-syllabic]* [+syllabic, +high]"
application = "right_to_left"

# A timed chain: the medial consonant of *pata* lenites step by step through the centuries
# (t > d > ð > ∅), so one word's history shows across several timesteps. Rules sharing a
# time (300) are grouped under that time.
[lenition_voicing]
words      = ["sound change over time"]
time       = 100
name       = "Intervocalic voicing"
definition = "[-sonorant, -continuant] -> [+voice] / [+syllabic] _ [+syllabic]"

[lenition_spirantization]
words      = ["sound change over time"]
time       = 200
name       = "Spirantisation"
definition = "[-sonorant, -continuant, +voice] -> [+continuant] / [+syllabic] _ [+syllabic]"

[lenition_loss]
words      = ["sound change over time"]
time       = 300
name       = "Debuccalisation"
definition = "[-sonorant, +continuant, +voice] -> ∅ / [+syllabic] _ [+syllabic]"

[lenition_hiatus]
words      = ["sound change over time"]
time       = 300
name       = "Hiatus coalescence"
definition = "[+syllabic] [+syllabic] -> [length: long] ∅"

# Turkish vowel harmony, shown two equivalent ways on otine/utine (both → -unɤ).
#
# (1) By feature AGREEMENT: every vowel agrees in backness (α/β) with the preceding vowel;
# rounding (γ/δ) is gated by the conditional <1: +high>, so it reaches only a high vowel.
[vowel_harmony]
words       = ["vowel harmony (agreement)"]
name        = "Vowel harmony (agreement)"
definition  = "[+syllabic, <1: +high>] -> [α front, β back, <1: γ rounded>, <1: δ labial>] / [+syllabic, α front, β back, γ rounded, δ labial] [-syllabic]* _"
application = "left_to_right"

# (2) By autosegmental SPREADING: each harmonic feature is copied from the preceding vowel by
# node-spread (~n). Backness copies the `back` node (clearing `front`); rounding, gated by the
# same <1: +high>, copies `rounded`/`labial`. A node-spread binds nodes the source must carry,
# so this fires from a back, round vowel — the same outcome as (1) by a different mechanism.
[vowel_harmony_spread]
words       = ["vowel harmony (spreading)"]
name        = "Vowel harmony (spreading)"
definition  = "[+syllabic, <1: +high>] -> [back: ~1, front: none, <1: rounded: ~2>, <1: labial: ~3>] / [+syllabic, back: ~1, rounded: ~2, labial: ~3] [-syllabic]* _"
application = "left_to_right"
