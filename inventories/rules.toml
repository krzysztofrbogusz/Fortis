# Laryngeal colouring: *h₂ (x) colours an adjacent *e to *a, *h₃ (ɣʷ) to *o, on
# either side (*h₁ leaves *e alone). A merge result (not a letter) so a stressed /e/
# keeps its stress. *h₃ is the rounded back fricative (-sonorant, vs the glide w).
# The target is *e specifically — the mid front vowel [+syll, +front, !+aperture];
# the !+aperture excludes *i and *a (which are [+aperture]), so only *e colours.
[a_colouring_after_h2]
time = -2000
name = "A-colouring after *h₂"
description = "*h₂e > *h₂a"
definition = "[+syll, +front, !+aperture] → [low: 1, aperture: 1, RTR: 1, ATR: none] / x _"

[a_colouring_before_h2]
time = -2000
name = "A-colouring before *h₂"
description = "*eh₂ > *ah₂"
definition = "[+syll, +front, !+aperture] → [low: 1, aperture: 1, RTR: 1, ATR: none] / _ x"

[o_colouring_after_h3]
time = -2000
name = "O-colouring after *h₃"
description = "*h₃e > *h₃o"
definition = "[+syll, +front, !+aperture] → [back: 1, rounded: 1, labial: 1, front: none] / [+cons, +continuant, +back, +rounded, -sonorant] _"

[o_colouring_before_h3]
time = -2000
name = "O-colouring before *h₃"
description = "*eh₃ > *oh₃"
definition = "[+syll, +front, !+aperture] → [back: 1, rounded: 1, labial: 1, front: none] / _ [+cons, +continuant, +back, +rounded, -sonorant]"

[centumization]
time = -2000
name = "Centumization"
description = "Merging of PIE 'palatovelar' and 'velar' plosives"
definition = "[+cons, -sonorant, +back, +front] → [front: none]"

[u_epenthesis]
time = -2000
name = "'u' epenthesis"
description = "Epenthesis of /u/ before the syllabic sonorants"
definition = "∅ [+cons, +syll] → u [-syll]"

# A dental stop + epenthetic s + dental stop collapses to ss (*TsT > ss): the dental
# stops ([+cons,-continuant,+anterior,-sonorant], i.e. t/d) become s, the span
# shrinking 3→2. The result is letters (replacement path) so the lengths may differ.
[dental_cluster]
time = -2000
name = "Dental cluster simplification"
description = "*TsT > ss — *wid-tós (*widstos) > *wissós 'certain'"
definition = "[+cons, -continuant, +anterior, -sonorant] s [+cons, -continuant, +anterior, -sonorant] → s s"

[backness_harmony]
time = 1300
name = "Backness harmony"
description = "Backness spreads rightward from a vowel onto following vowels."
definition = "[+syll] → [α fr, β bk] / [+syll, α fr, β bk] [-syll]* _"
application = "left_to_right"
