name: Deploy web app to GitHub Pages

# Builds the browser playground in web/ and publishes web/dist to GitHub Pages.
# The app is fully client-side (Pyodide runs CPython in the browser) and resolves
# its runtime assets relative to document.baseURI, so it works under the project
# subpath https://<user>.github.io/<repo>/ with vite's base: './'.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the OIDC + pages scopes the deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build (bundles engine.tgz + pyodide + example projects, then vite build)
        run: npm run build
        working-directory: web
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
