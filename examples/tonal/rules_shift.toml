# An alternative to high_spread: instead of SPREADING, the high tone SHIFTS one syllable
# rightward — it delinks from its own vowel and re-docks on the next (the *same* autosegment,
# moved). A different language, the same words.
#
#   python -m src.fortis.main --inventories examples/tonal --rules examples/tonal/rules_shift.toml

[high_shift]
time        = 0
name        = "High-tone shift (displacement)"
description = "A high tone delinks from its own vowel and re-docks one syllable to the right."
definition  = "[+syllabic, tone: ~1=high] [-syllabic]* [+syllabic, tone: none] → [+syllabic, tone: none] [-syllabic]* [+syllabic, tone: ~1]"
