# A small tonal language showcasing the autosegmental tier operations on real derivations.
# Run with:  python -m src.fortis.main --inventories examples/tonal     (see SHOWCASE.md)
#
# High tone is a combining acute (a + U+0301); a floating high is ⟨◌́⟩. The contour word uses
# extra-high (U+030B) and mid (U+0304).

"táka" = "high-tone spread: the high on the first vowel spreads onto the second"
"katá" = "tonal stability: the final high survives when its vowel is lost"
"naka⟨◌́⟩" = "floating-tone docking: a floating high suffix docks onto the final syllable"
"ka̋tā" = "contour formation: two level tones crowd onto one vowel when the final vowel is lost"
