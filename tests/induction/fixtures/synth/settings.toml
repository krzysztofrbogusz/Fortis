# Tunable analysis parameters. Every value below is the built-in default: a project
# needs a settings.toml only to change one, and may list just the keys it overrides —
# any omitted key (or a missing file) falls back to these built-in defaults.

[grading]
# Cost of a metathesis (swapping two adjacent segments) in the edit distance. 1 scores
# a reorder as a single edit; set 2 to score it as two substitutions instead.
transposition_cost = 1

[diagnosis]
# A context predictor enters the autopsy only if it clears the support floor:
# max(min_support, min_support_percent% of the focus phone's occurrences). The absolute
# floor guards the phi coefficient against tiny cell counts; the percentage scales the
# floor with the word base, so a predictor covering a trivial slice of a common phone is
# dropped as noise rather than topping the ranking.
min_support = 3
min_support_percent = 10
# A focus phone is autopsied only once it has come out wrong at least this many times.
min_errors = 2
# How many predictors to show per phone in diagnosis.md (the most error-associated).
report_top = 8
# How many of the top confusions' focus phones to run a context autopsy on.
focus_count = 5

[induction]
# Knobs for supervised rule induction. These steer the search; the MDL bits constants
# that price fit against rule cost are module constants (part of the objective), not here.
# A candidate must strictly improve at least this many words to be accepted (on top of MDL).
min_improved_words = 2
# How many of the top residual confusions to expand into candidates per iteration.
top_confusions = 5
# Candidate cap per confusion.
contexts_per_confusion = 25
# Candidates (ranked by the append-placement ΔL) that get the full placement search.
placement_candidates = 5
# Iteration cap per interval (a runaway-loop backstop).
max_rules_per_interval = 60
# Words beyond this alignment distance don't feed the correspondence tallies (still counted
# in the loss), since their alignments are unreliable.
alignment_distance_cap = 4
# Weight on the final checkpoint relative to intermediate stages; lower it when a project's
# intermediate notation is only loosely comparable to the engine's output.
final_weight = 1.0
