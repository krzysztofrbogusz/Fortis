# A tiny synthetic cascade of clean, inducible changes, with times mirroring the Latin→French
# stage schema so the induction tests' interval boundaries line up. Each stage interval carries
# at least one change; the 750→1000 interval carries two (k→t and m→n) so the shrink tests have
# a pair of independently load-bearing rules. Generated fixture — see words.toml's header.
[voicing]
time = -100
name = "intervocalic p voicing"
definition = "p → b / [+syllabic] _ [+syllabic]"

[o_raising]
time = 750
name = "o raises to u"
definition = "o → u"

[k_fronting]
time = 1000
name = "k fronts to t"
definition = "k → t"

[m_to_n]
time = 1000
name = "m goes to n"
definition = "m → n"

[final_s_loss]
time = 1200
name = "final s is lost"
definition = "s → ∅ / _ #"

[final_e_raising]
time = 1400
name = "final e raises to i"
definition = "e → i / _ #"
