definition = "[+front, rounded: none, +syllabic, +nasal] → [nasal: none] / _ [+consonantal, +nasal] [-consonantal]"

[mf_aj_to_e_before_tonic]
time = 1400
name = "aj becomes e before a tense tonic vowel"
description = "Pope s531.ii — late 17th century; CORRECTION: only before tense tonic vowels, resolving to e (not ɛj); CORRECTION 2024: can see through an intervening glide"
definition = "[aperture: low, +front] j → [aperture: mid, advancement: rtr] ∅ / _ ([-consonantal, -syllabic])? [stress: primary, advancement: atr]"

[mf_mid_vowel_laxes_before_yod]
time = 1400
name = "mid vowels lax before i/j"
description = "CORRECTION"
definition = "[+syllabic, aperture: mid] → [advancement: rtr] / _ [-consonantal, aperture: high, +front]"

[mf_countertonic_schwa_after_labial_l_to_e]
time = 1400
name = "countertonic ə/ɛ becomes ˌe after a labial + l"
description = "CORRECTION"
definition = "[rounded: none, aperture: mid, back: none, stress: secondary] → ˌe / [+labial] l _"

[mf_r_approximant_reverts_to_trill]
time = 1400
name = "the approximant ɹ reasserts as a trill r wherever it was not deleted"
description = "per Pope s400-401"
definition = "ɹ → r"

[mf_h_deletion]
time = 1400
name = "h is deleted (second h-deletion)"
description = "Pope s196 — accepted in the late 17th century; only affects Frankish/Germanic loans"
definition = "h → ∅"

[mf_r_becomes_uvular]
time = 1400
name = "r becomes uvular ʀ"
description = "Pope s394 ~ s498 — 17th century"
definition = "r → ʀ"

[mf_stress_leveling]
time = 1400
name = "stress is leveled — no longer distinctive for vowels"
description = "Pope s121 ~ s170 ~ s223 ~ s508 ~ s602"
definition = "[+syllabic, stress: !none] → [stress: none]"

[mf_long_nasal_u_denasalizes_to_o]
time = 1400
name = "long ũː denasalizes to o before a short nasal u"
description = "CORRECTION — as o rather than ɔ (Saône, Jérôme). The trigger is a following nasal VOWEL (per the name); the bare `[+nasal]` context also matched a nasal consonant, wrongly denasalizing coin kũːn̪ > *kon̪ where the n̪ should instead nasalize+drop."
definition = "[aperture: high, +back, +rounded, +nasal, +syllabic, length: long] → o / _ [+nasal, +syllabic]"

[mf_length_neutralized]
time = 1400
name = "distinctive vowel length is lost entirely"
description = "CORRECTION — by 1700 (perhaps begun in the 16th century, cf. Gess 2001); length survives in conservative dialects (Belgium, Quebec) but not Paris; CORRECTION 2026: any length deleted"
definition = "[length: long] → [length: short]"

[mf_nasal_u_opens]
time = 1400
name = "nasal ũ opens to ɔ̃"
description = "Pope s460 — 17th century, still incomplete (s462) in 1696"
definition = "[aperture: high, +back, +rounded, +nasal, +syllabic] → [aperture: mid, advancement: rtr]"

[mf_round_nasal_denasalizes_open_syllable]
time = 1400
name = "ɔ̃ (and œ̃) denasalizes in an open syllable before a nasal consonant"
description = "Pope s463 — first attested late 17th century, accepted in the 18th"
definition = "[+rounded, +nasal] → [nasal: none] / _ [+nasal, +consonantal] [+syllabic]"

[mf_nasal_vowel_denasalizes_before_final_nasal]
time = 1400
name = "a nasal vowel denasalizes before a surviving nasal consonant"
description = "CORRECTION — handled whenever the nasal consonant has not been deleted (i.e. now word-final or pre-vowel)"
definition = "[+syllabic, +nasal] → [nasal: none] / _ [+nasal, +consonantal]"

[mf_final_open_o_to_o]
time = 1400
name = "word-final ɔ raises to o"
description = "CORRECTION"
definition = "ɔ → o / _ #"

[mf_we_to_wa]
time = 1400
name = "wɛ becomes wa"
description = "Pope s525 — first attested late 16th century, generalized only around the Revolution"
definition = "ɛ → a / w _"

[mf_uvular_trill_to_fricative]
time = 1400
name = "the uvular trill ʀ becomes a fricative ʁ"
description = "CORRECTION"
definition = "ʀ → ʁ"

[mf_yod_absorbed_after_high_front]
time = 1400
name = "a yod is absorbed after a high front vowel (word-finally or before a consonant)"
description = "The palatal glide left by e.g. ct-palatalization (lectum > lejt > lit /li/, outil, six) is redundant after a high front i and is lost. This must run BEFORE ʎ→j (DiaSim's j-after-i deletion, rule 471, is early): it catches the diphthong-derived yod but NOT the word-final /ij/ ending that ʎ→j creates just afterward (fille /fij/, not *fi)."
definition = "j → ∅ / [aperture: high, +front, +syllabic] _ ([+consonantal]|#)"

[mf_palatal_l_to_yod]
time = 1400
name = "ʎ becomes j"
description = "Pope s381 ~ s687 — \"in the course of Modern French\". Ordered AFTER the yod-absorption above so the /ij/ ending it produces (fille) survives."
definition = "ʎ → j"

[mf_high_front_absorbed_into_yod]
time = 1400
name = "a high front vowel after another vowel is absorbed into a following j"
description = "CORRECTION — j and i after other vowels absorbed into j (DiaSim rule 744, runs after ʎ→j: rouille ʁuiʎ > ʁuij > ʁuj)."
definition = "[aperture: high, +front, rounded: none] → ∅ / [+syllabic] _ j"

[mf_schwa_deletion]
time = 1400
name = "ə is effaced wherever it does not bring three consonants together"
description = "Pope s177.2 — CORRECTION: final-schwa deletion spares lexical citation monosyllables (despite l', m', qu' etc.); the three-consonant guard case is suppressed as it conflicted with Pope's later notations"
definition = ["ə → ∅ / [+syllabic] ([-syllabic])* _ #", "ə → ∅ / _ [+syllabic]", "ə → ∅ / [+syllabic] _"]
