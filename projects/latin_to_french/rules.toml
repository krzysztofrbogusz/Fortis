# Classical Latin → Modern French, ported from DiaSim's DiaCLEF2025 cascade
# (https://github.com/clmarr/DiaSim/blob/gamma/DiaCLEF2025), which is itself a computerized
# encoding — refined via forward-reconstruction testing against real Latin/French word pairs
# (Marr & Mortensen 2020, 2023; Marr 2024) — of the relative chronology described in Mildred K.
# Pope's 1934 "From Latin to Modern French". See ../../README.md of this project for full
# attribution and license notes (DiaSim/DiaCLEF2025 is GPL-3.0; this is an independent
# re-authoring in Fortis's own notation, not a copy of DiaSim's source text).
#
# DiaCLEF2025's own stage markers (~/=) give the period boundaries used here as time values:
#   -100  Classical Latin       (lines 1-378 of DiaCLEF2025)
#    300  Late Latin            (379-509)
#    500  Early Gallo-Roman     (510-1088)
#    600  Middle Gallo-Roman    (1089-1813)
#    750  Later Gallo-Roman     (1814-2212)
#   1000  Old French I (Early)  (2213-2789)
#   1200  Old French II (Later) (2790-3010)
#   1400  Middle/Modern French  (3011-3301)
# Rules sharing a time value are applied in the file order below, preserving DiaCLEF2025's own
# relative ordering within each period exactly.

# --- Classical Latin (Pope ch. II p.72ff, characteristics as of p.75) ---

[cl_n_velar_assim]
time = -100
name = "n assimilates to a following velar stop"
definition = "n̪ → ŋ / _ [aperture: high, +back, -continuant, nasal: none]"

[cl_g_n_assim]
time = -100
name = "g assimilates to a following coronal nasal (gn cluster)"
definition = "g → ŋ / _ n̪"

[cl_a_backing]
time = -100
name = "low vowel backs by default"
definition = "[aperture: low, +syllabic] → [front: none, +back]"

[cl_a_fronting_before_e_glide]
time = -100
name = "low vowel re-fronts before the e-glide"
definition = "[aperture: low, +syllabic] → [+front, back: none] / _ e̯"

[cl_d_total_assim_obstruent]
time = -100
name = "d totally assimilates to a following obstruent"
description = "e.g. ad + capere > accapere, ad + ferre > afferre (prefix-final d assimilation)"
definition = "d̪ → @1 / _ 1=[-sonorant]"

[cl_d_total_assim_nasal]
time = -100
name = "d totally assimilates to a following nasal"
definition = "d̪ → @1 / _ 1=[+nasal]"

[cl_jw_hardening]
time = -100
name = "j/w harden to fricative-like consonants before a vowel (not in a falling diphthong)"
description = "Pope s106 (j: p55 s106c; w: p56 s109)"
definition = "(j|w) → [+consonantal, -sonorant] / _ [+syllabic]"

[cl_ghw_to_w_after_velar]
time = -100
name = "the labiovelar approximant simplifies to w after a velar consonant"
description = "Pope s186 — betacism doesn't occur after k"
definition = "ɣʷ → w / [+back, aperture: high, +consonantal] _"

[cl_b_total_assim]
time = -100
name = "b totally assimilates to a following m or the labiovelar approximant"
definition = "b → @1 / _ 1=(m|ɣʷ)"

[cl_greek_deaspiration]
time = -100
name = "aspiration lost on Greek loanwords (2nd century)"
description = "Pope p226 s629"
definition = "[glottal_aperture: spread, -continuant, nasal: none] → [glottal_aperture: neutral]"

[cl_greek_y_unrounding]
time = -100
name = "Greek y unrounds to i"
description = "Pope p226-7 s632"
definition = "[aperture: high, +front, +syllabic] → [rounded: none, labial: none]"

[cl_ns_lengthening]
time = -100
name = "vowel lengthens before ns when the next syllable is unstressed"
description = "Pope s359 ~ s156iii"
definition = "[+syllabic] → [length: long] / _ n̪ s ([-syllabic])* [stress: none]"

[cl_n_loss_after_long_before_s]
time = -100
name = "n lost after a long vowel before s (compensatory lengthening already applied)"
definition = "n̪ → ∅ / [+syllabic, length: long] _ s"

[cl_r_loss_after_long_before_s]
time = -100
name = "r lost after a long vowel before s"
description = "Pope s359 ~ s156iii — e.g. persica, dorsum"
definition = "r → ∅ / [+syllabic, length: long] _ s"

[cl_pietatem_type_lengthening]
time = -100
name = "stressed i + e becomes iːx (pietatem-type lexemes)"
description = "Pope explicitly notes pitie' as pixt-, implying this development"
definition = "[aperture: high, +front, +syllabic, stress: primary] e → [length: long] x / _ [nasal: none]"

[cl_quantity_to_quality_1]
time = -100
name = "Classical Latin length distinction becomes a quality (tense) distinction, first pass"
description = "Pope p72-73 s154i ~ p89 s179 — short non-low vowels become lax; 2024 correction: only for vowels with some degree of stress is implicit in later re-application"
definition = "[+syllabic, aperture: !low, length: short] → [advancement: rtr]"

[cl_h_loss_internal]
time = -100
name = "h lost word-internally (word-initial h survives at this stage)"
description = "Pope s155i ~ s185"
definition = "h → ∅ // # _"

[cl_i_prosthesis]
time = -100
name = "i-prosthesis before word-initial s + consonant"
description = "Pope s361 — Western Romance, attested 2nd century"
definition = "∅ → ˌɪ / # _ s [+consonantal]"

[cl_i_prosthesis_stress]
time = -100
name = "the prosthetic vowel carries secondary stress"
description = "DiaSim inserts ˌɪ and the secondary stress rides through, protecting the vowel from the unstressed reduction e→ə→∅ (scutarium ˌesk… > écuyer /ekɥije/, stamen > étaim /et̪ɛ̃/, sponsum > époux /epu/). Insertion via ∅→ˌɪ does not realize the stress on the new syllable in Fortis, so set it explicitly on the word-initial prosthetic vowel."
definition = "[+syllabic, stress: none] → [stress: secondary] / # _ s [+consonantal]"

[cl_stress_shift_antepenult_1]
time = -100
name = "stress moves to the penult when the antepenult has an adjacent short vowel (type 1)"
description = "Pope s214i — must precede yod formation, which it feeds"
definition = "[+syllabic, aperture: mid, stress: none] → [stress: primary] / [stress: primary, aperture: !low, +front, length: short] _ ([-syllabic])* [+syllabic] ([-syllabic])* #"

[cl_stress_shift_antepenult_1_demote_old]
time = -100
name = "the old primary stress demotes when a new one has been placed (type 1)"
description = "stress is syllable-level, so bare [stress: primary] matches every segment of the stressed syllable (including its onset) — both the target and the lookahead are anchored to +syllabic so only the nucleus can match"
definition = "[+syllabic, stress: primary] → [stress: secondary] / # ([-syllabic])* _ [+syllabic, stress: primary]"

[cl_stress_shift_antepenult_1_clear_secondary]
time = -100
name = "any leftover non-primary stress clears once a new primary is set (type 1)"
definition = "[+syllabic, stress: primary] → [stress: none] / _ [+syllabic, stress: primary]"

[cl_stress_shift_antepenult_2]
time = -100
name = "stress moves forward if the antepenult's following syllable is short-vowel + stop + r (type 2, not for educated classes)"
description = "Pope s214ii"
definition = "[stress: none] → [stress: primary] / [stress: primary] ([-syllabic])* _ [-continuant, nasal: none] r ([-syllabic])* [+syllabic] ([-syllabic])* #"

[cl_stress_shift_antepenult_2_demote_old]
time = -100
name = "the old primary stress demotes when a new one has been placed (type 2)"
description = "stress is syllable-level, so bare [stress: primary] matches every segment of the stressed syllable (including its onset) — both the target and the lookahead are anchored to +syllabic so only the nucleus can match"
definition = "[+syllabic, stress: primary] → [stress: secondary] / # ([-syllabic])* _ ([-syllabic])* [+syllabic, stress: primary]"

[cl_stress_shift_antepenult_2_clear_secondary]
time = -100
name = "any leftover non-primary stress clears once a new primary is set (type 2)"
definition = "[+syllabic, stress: primary] → [stress: none] / _ ([-syllabic])* [+syllabic, stress: primary]"

[cl_yod_w_formation]
time = -100
name = "unstressed short non-low vowels glide before another vowel (yod/w formation)"
description = "Pope s220, s156i — called for this early by s187. Output is a true glide (+consonantal): a pre-vocalic yod/w, not a diphthong off-glide semivowel — so it feeds yod strengthening (j→ʝ) and the palatalization chain, matching DiaSim's single [+hi,-syl] yod."
definition = "[+syllabic, length: short, stress: none, aperture: !low] → [aperture: high, syllabic: -, +consonantal, advancement: atr] / _ [+syllabic]"

[cl_u_to_sonus_medius]
time = -100
name = "unstressed long u becomes a mid central vowel (sonus medius), not word-finally"
description = "Diachronically equivalent to ɪ; does not bleed or feed prior yod formation. Target guarded to unstressed — a bare `uː` literal matches any stress, so it was eating the stressed ū of crus/durs/salut (which must survive to front to y)."
definition = "[aperture: high, +back, +rounded, +syllabic, length: long, stress: none] → ɪ / _ [-syllabic] // _ [-syllabic] #"

[cl_yod_loss_after_pr]
time = -100
name = "yod lost between p/r and a following front non-high non-low vowel"
description = "Pope s220"
definition = "j → ∅ / (p|r) _ [+front, aperture: mid, +syllabic]"

[cl_l_darkening]
time = -100
name = "l darkens before a non-lateral consonant"
definition = "l → ɫ / _ [+consonantal, lateral: none]"

[cl_yod_strengthening]
time = -100
name = "yod strengthens before a vowel"
description = "Pope s105c, s106. Matches the yod by bundle (not the literal `j`): a derived pre-vocalic glide carries advancement: atr, so it is not letter-identical to `j` — but it is the same [+cons, +front, high, -syll] segment DiaSim strengthens."
definition = "[+consonantal, +front, aperture: high, syllabic: -] → ʝ / _ [+syllabic]"

[cl_yod_loss_after_velar_w]
time = -100
name = "the strengthened yod is lost word-initially after a velar stop + w"
definition = "ʝ → ∅ / # [+back, -continuant, nasal: none] w _"

[cl_round_glide_loss_before_yod]
time = -100
name = "the rounded glide is lost before the strengthened yod"
definition = "(ɣʷ|w) → ∅ / _ ʝ"

[cl_ghw_loss_lo_round]
time = -100
name = "the labiovelar approximant is lost between a low vowel and a rounded vowel"
definition = "ɣʷ → ∅ / [aperture: low] _ [+syllabic, +rounded]"

[cl_w_loss_after_k_round]
time = -100
name = "w is lost after k before a rounded vowel"
definition = "w → ∅ / k _ [+syllabic, +rounded]"

[cl_syncope_u_o_before_l]
time = -100
name = "posttonic ʊ/o syncopates before l + vowel near the end of the word"
definition = "(ʊ|o) → ∅ / [+syllabic, stress: primary] ([-syllabic])* ([-continuant, nasal: none]|m|r) _ [+lateral] [+syllabic] ([-syllabic])? #"

[cl_syncope_o_before_l]
time = -100
name = "posttonic ɔ syncopates before l + vowel near the end of the word"
definition = "ɔ → ∅ / [+syllabic, stress: primary] ([-syllabic])* ([-continuant, labial: none, nasal: none]|m|r) _ [+lateral] [+syllabic] ([-syllabic])? #"

[cl_syncope_i_before_d_front]
time = -100
name = "posttonic ɪ syncopates between a sonorant and d + front non-low vowel (-idem/-item type)"
definition = "ɪ → ∅ / [+syllabic, stress: primary] ([-syllabic])* [+sonorant] _ d̪ [+front, aperture: !low] ([-syllabic])? #"

[cl_syncope_i_before_d_back]
time = -100
name = "posttonic ɪ syncopates between a voiced consonant and d + back non-low vowel"
definition = "ɪ → ∅ / [+syllabic, stress: primary] ([-syllabic])* [+consonantal, +voice] _ d̪ [+back, aperture: !low] ([-syllabic])? #"

[cl_syncope_between_n_r]
time = -100
name = "posttonic non-low vowel syncopates between n and r + vowel"
definition = "[aperture: !low, stress: none] → ∅ / [+syllabic, stress: primary] ([-syllabic])* n̪ _ r [+syllabic]"

[cl_syncope_between_l_r]
time = -100
name = "posttonic non-low vowel syncopates between l and r + vowel"
definition = "[aperture: !low, stress: none] → ∅ / [+syllabic, stress: primary] ([-syllabic])* [+lateral] _ r [+syllabic]"

[cl_i_loss_after_vowel_velar]
time = -100
name = "ɪ lost after a non-low vowel + velar stop, before l"
definition = "ɪ → ∅ / [aperture: !low, +syllabic] [-continuant, +back, nasal: none] _ l"

[cl_front_vowel_syncope_a]
time = -100
name = "unstressed front vowel lost between a back stop and a coronal (type a)"
definition = "[stress: none, +front] → ∅ / [stress: primary, aperture: low] [+back, -continuant, nasal: none] _ [+lingual, +front, strident: none, nasal: none, lateral: none] [+syllabic]"

[cl_front_vowel_syncope_b]
time = -100
name = "unstressed front vowel lost between g and a voiced coronal"
definition = "[stress: none, +front] → ∅ / [+syllabic] g _ [+lingual, +front, lateral: none, +voice] [+syllabic]"

[cl_i_loss_ghw_k]
time = -100
name = "ɪ lost between the labiovelar approximant and k"
definition = "ɪ → ∅ / ɣʷ _ k"

[cl_ghw_to_w_before_cons]
time = -100
name = "the labiovelar approximant simplifies to w before a consonant"
definition = "ɣʷ → w / _ [+consonantal]"

[cl_ghw_to_w_lo_lo]
time = -100
name = "the labiovelar approximant simplifies to w between low vowels (second short)"
definition = "ɣʷ → w / [aperture: low, +syllabic] _ [aperture: low, +syllabic, length: short]"

[cl_ghw_remainder_to_bw]
time = -100
name = "any remaining labiovelar approximant becomes a labialized voiced bilabial fricative"
definition = "ɣʷ → βʷ"

[cl_b_lenition]
time = -100
name = "b lenites to β intervocalically / before a sonorant"
definition = "b → β / [+syllabic] _ [+sonorant]"

[cl_posttonic_g_loss]
time = -100
name = "unstressed g deleted between an unstressed vowel and the following unstressed syllable"
description = "target and right-context anchored to +syllabic — bare [stress: none] matches any segment of an unstressed syllable, including a following onset consonant, not just its nucleus"
definition = "[stress: none, +syllabic] g → ∅ / [stress: primary] ([-syllabic])* _ [stress: none, +syllabic] ([-syllabic])* #"

[cl_ee_contraction_stressed_second]
time = -100
name = "e + e contracts to a long stressed e when stress is on the second vowel"
definition = "[+front, aperture: mid, +syllabic] [+front, aperture: mid, +syllabic, stress: primary] → ˈeː"

[cl_oo_contraction_stressed_second]
time = -100
name = "o + o contracts to a long stressed o when stress is on the second vowel"
definition = "[+rounded, aperture: !high, +syllabic] [+rounded, aperture: !high, +syllabic, stress: primary] → ˈoː"

[cl_ee_contraction_stressed_first]
time = -100
name = "e + e contracts to a long secondary-stressed e when stress is on the first vowel"
definition = "[+front, aperture: mid, +syllabic, stress: secondary] [+front, aperture: mid, +syllabic] → ˌeː"

[cl_quantity_to_quality_2]
time = -100
name = "Classical Latin length distinction becomes a quality distinction, second pass"
description = "Reapplied after the contractions above introduce new short non-low vowels"
definition = "[+syllabic, aperture: !low, length: short] → [advancement: rtr]"

[cl_long_feature_becomes_redundant]
time = -100
name = "the length feature is dropped now that quality carries the contrast"
definition = "[+syllabic, length: long] → [length: short]"

[cl_ae_monophthongization]
time = -100
name = "the ae diphthong monophthongizes to ɛ, preserving any stress mark"
definition = "(a e̯|ˌa e̯|ˈa e̯) → (ɛ|ˌɛ|ˈɛ)"

[cl_oe_monophthongization]
time = -100
name = "the oe diphthong monophthongizes to e"
description = "Placed after the length>tense shift, per Pope's own logic, else oe would become ɛ"
definition = "[+rounded, aperture: !high, +syllabic] e̯ → [+front, rounded: none, back: none, advancement: atr, labial: none] ∅"

[cl_k_loss_after_ng_before_voiceless_coronal]
time = -100
name = "k lost after ŋ before a voiceless coronal"
definition = "k → ∅ / ŋ _ [+lingual, +front, -voice]"

[cl_k_loss_before_sc]
time = -100
name = "k lost before s + consonant"
definition = "k → ∅ / _ s [+consonantal]"

[cl_k_to_x]
time = -100
name = "k spirantizes to x after a vowel/glide before a voiceless coronal"
definition = "k → x / [-consonantal] _ [+lingual, +front, -voice]"

[cl_e_raising_before_ssj]
time = -100
name = "secondary-stressed ɛ raises to e before ssʝ"
definition = "ˌɛ → ˌe / _ s s ʝ"

[cl_g_spirantizes_before_m]
time = -100
name = "g spirantizes before m"
definition = "g → [+continuant] / _ m"

[cl_gh_to_w_before_m]
time = -100
name = "the resulting velar fricative becomes w before m"
definition = "ɣ → w / _ m"

[cl_w_loss_au_u_sequence]
time = -100
name = "w lost between ɑ and an eventual stressed high round back vowel"
definition = "[-syllabic, -consonantal, aperture: !low, +rounded, +back] → ∅ / ˌɑ _ ([-syllabic])* [+syllabic, stress: primary, aperture: high, +rounded, +back]"

[cl_lax_high_to_tense_mid]
time = -100
name = "lax high vowels lower to tense mid vowels"
definition = "[aperture: high, +syllabic, advancement: rtr] → [aperture: mid, advancement: atr]"

[cl_o_lowering_before_high_back]
time = -100
name = "stressed o lowers to ɔ before a high back vowel"
definition = "ˈo → ˈɔ / _ [aperture: high, +syllabic, +back]"

[cl_e_raising_before_low]
time = -100
name = "stressed ɛ raises to e before a low vowel"
definition = "ˈɛ → ˈe / _ [aperture: low, +syllabic]"

[cl_e_raising_before_e]
time = -100
name = "stressed e raises to i before e"
definition = "ˈe → ˈi / _ e"

[cl_t_to_k_before_lateral]
time = -100
name = "t becomes k before a lateral"
definition = "t̪ → k / _ [+lateral]"

[cl_final_nasal_loss_unstressed]
time = -100
name = "word-final nasal consonant lost after an unstressed vowel"
definition = "[+nasal, +consonantal] → ∅ / [stress: none] _ #"

[cl_final_nasal_loss_low_nonprimary]
time = -100
name = "word-final nasal consonant lost after a non-primary-stressed low vowel"
definition = "[+nasal, +consonantal] → ∅ / [aperture: low, +syllabic, stress: !primary] _ #"

[cl_w_dissimilation_kw_kw]
time = -100
name = "w dissimilates between two kw sequences"
definition = "w → ∅ / k _ [+syllabic] ([-syllabic])? k w [+syllabic]"

[cl_ts_to_f_before_sonorant_cons]
time = -100
name = "ts becomes f before a sonorant consonant"
definition = "t͡s → f / _ [+consonantal, +sonorant]"

[cl_td_palatalization_before_yod]
time = -100
name = "t/d palatalize before yod (t → tsʲ, d → ɟ)"
definition = "(t̪|d̪) → (t͡sʲ|ɟ) / _ [aperture: high, +front, syllabic: -, +continuant]"

[cl_k_gemination_before_yod_vowel]
time = -100
name = "k geminates (as palatal cc) intervocalically before yod + vowel"
definition = "k → c c / [+syllabic] _ ʝ [+syllabic]"

[cl_velar_fronting_second_palatalization]
time = -100
name = "a velar stop fronts before a following front non-low continuant (second palatalization trigger)"
definition = "[aperture: high, +back, -continuant, nasal: none] → [+front] / _ [+continuant, aperture: !low, +front, lateral: none]"

[cl_back_front_cleanup]
time = -100
name = "a segment marked both back and front loses the back specification"
definition = "[+back, +front] → [back: none]"

[cl_k_assim_before_c]
time = -100
name = "k assimilates to a following palatal c"
definition = "k → c / _ c"

[cl_c_depalatalization]
time = -100
name = "palatal c depalatalizes back to k in a specific stressed-antepenult context"
description = "\"@\" in the source marks \"not word-final\"; here rendered as an exception"
definition = "c → k / [+back, stress: primary] _ [aperture: mid, +front, +syllabic, stress: none] (t̪|r|l) // [+back, stress: primary] _ [aperture: mid, +front, +syllabic, stress: none] (t̪|r|l) #"

[cl_lateral_loss_before_nasal_yod]
time = -100
name = "a lateral is lost before a nasal + yod"
definition = "[+lateral] → ∅ / _ [+nasal] ʝ"

[cl_voiced_stop_spirantization]
time = -100
name = "a voiced high stop/affricate spirantizes after a vowel before a sonorant or yod"
definition = "[-continuant, aperture: high, +voice, nasal: none] → [+continuant] / [-consonantal] _ ([+sonorant, lateral: none, nasal: none]|ʝ)"

# --- Late Latin (Pope p73 s155-5iv ff.) ---

[ll_yod_absorption]
time = 300
name = "yod absorbed into a preceding palatalized consonant"
definition = "ʝ → ∅ / [-continuant, aperture: high, +front, nasal: none] _"

[ll_yod_absorption_affricate]
time = 300
name = "yod absorbed into a preceding palatalized affricate"
description = "DiaSim source line 382: ʝ > ∅ / [-cont,+hi,+front] __. DiaSim treats an affricate onset as [-cont], but Fortis affricates carry a contour continuant (->+), so the [-continuant] rule above misses them. This companion catches the palatalized strident affricates t͡sʲ/d͡zʲ (latia > laize: the -ia yod is absorbed, leaving a plain dental affricate that depalatalizes to jz > z, not a second palatal d͡ʒ)."
definition = "ʝ → ∅ / [+strident, +front, aperture: high, -sonorant, nasal: none] _"

[ll_mnj_to_mmj]
time = 300
name = "n assimilates to a preceding m before yod (mnj > mmj)"
description = "bleeds the following n+yod palatalization"
definition = "n̪ → m / m _ ʝ"

[ll_n_palatalization]
time = 300
name = "the coronal nasal palatalizes before yod"
description = "Pope p131 s311"
definition = "n̪ [aperture: high, +front, syllabic: -, +voice, +continuant] → ɲ"

[ll_ll_palatalization]
time = 300
name = "ll palatalizes to ʎ before yod"
description = "Pope p131 s312"
definition = "l l ʝ → ʎ"

[ll_l_palatalization]
time = 300
name = "l palatalizes to ʎ before yod"
definition = "l ʝ → ʎ"

[ll_syncope_after_bhw]
time = 300
name = "unstressed vowels deleted between the labiovelar fricative and a coronal stop"
description = "even when not penultimate, unlike Pope's s353"
definition = "[stress: none, +syllabic] → ∅ / [+syllabic] βʷ _ [+lingual, +front, -continuant, nasal: none, trill: none]"

[ll_e_to_schwa_glide]
time = 300
