[eof_ou_to_u_after_p]
time = 1000
name = "the diphthong ou simplifies to u before a labial consonant, after p"
definition = "[advancement: atr, +syllabic, +rounded, aperture: mid] [aperture: high, +back, +rounded, -syllabic] → [aperture: high] ∅ / p _"

[eof_countertonic_o_to_schwa_before_uy]
time = 1000
name = "secondary-stressed o reduces to schwa before tonic u-to-y"
