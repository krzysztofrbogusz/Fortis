# --- Old French I / Early Old French (Pope s16, 9th-11th centuries) ---

[eof_schwa_to_e_before_yod]
time = 1000
name = "unstressed schwa becomes e before a yod-like sonorant (j, ʎ, ɲ)"
description = "Pope s257, s252 — feeds the later ej > oj shift"
definition = "ə → e / _ [+front, +sonorant, aperture: high, -syllabic]"

[eof_e_to_i_before_palatal]
time = 1000
name = "intertonic e raises to i before a palatal consonant (ɲ, ʎ)"
description = "Pope s422. Source context `[+hi,+son,+front,+cons]` picks out the sonorant palatals ɲ/ʎ — but NOT the glide j, which DiaSim treats as -sonorant. Fortis's j IS +sonorant, so the featural context over-matched it and wrongly raised the e of every ei diphthong (avoir/trois eir → *ir); match ɲ/ʎ literally. Also: the source's bare `e` is UNSTRESSED (DiaSim bare-vowel convention), so the rule is intertonic-only — without the stress guard it wrongly raised the TONIC e before a -cul- ʎ (vermeil meʎ → *miʎ instead of staying e → ɛ → mɛj)."
definition = "[+syllabic, +front, aperture: mid, advancement: atr, rounded: none, stress: none] → [aperture: high] / _ (ɲ|ʎ)"

[eof_ll_degemination_intervocalic]
time = 1000
name = "intervocalic geminate ll degeminates to a single l (before l-vocalization)"
description = "A geminate ll that is still intervocalic when l-vocalization begins collapses to a plain l and stays /l/ (bella > belle /bɛl/), rather than its first half vocalizing. This must precede eof_l_vocalization_begins. Words where the following vowel has already dropped (mantellum > mantel > manteau) keep the geminate final and vocalize normally — they are past this context by now."
definition = "l l → l / [+syllabic] _ [+syllabic]"

[eof_l_vocalization_begins]
time = 1000
name = "l darkens before a consonant (beginnings of l-vocalization)"
description = "Pope s166.9, s383-391 — first attested 9th century; simplified to /ɫ/ throughout rather than distinguishing dark-l/gamma. Only the plain (non-palatal) lateral darkens — `[+lateral]` alone also matches the palatal ʎ, which must stay palatal to become j (maille ...aʎ.d͡ʒ, not *aɫ)."
definition = "[+lateral, +anterior] → ɫ / _ [+consonantal]"

[eof_dark_l_to_ny_lateral]
time = 1000
name = "dark l becomes ʎ after a front unrounded high vowel"
description = "Pope s382iv, s384"
definition = "ɫ → ʎ / [aperture: high, +front, rounded: none] _"

[eof_u_fronting_completes]
time = 1000
name = "high round back vowels front (completion of u-fronting)"
description = "Pope s166.1, s183, s9, s36, s42 — spread slowly from the south, continuing into the 10th century"
definition = "[aperture: high, +rounded, back: none] → [+front]"

[eof_first_nasalization_glide]
time = 1000
name = "j nasalizes after a low vowel, before a nasal (first nasalization)"
description = "Pope s166.6, s434, s441.1, s441.3 — 10th century; affects a and aj"
definition = "j → [+nasal] / [aperture: low] _ [+nasal, -syllabic]"

[eof_first_nasalization_vowel]
time = 1000
name = "a low vowel nasalizes before a nasal (first nasalization)"
definition = "[aperture: low] → [+nasal] / _ [+nasal, -syllabic]"

[eof_countertonic_e_to_schwa_open]
time = 1000
name = "secondary-stressed e reduces to schwa in an open syllable"
description = "Pope s166.5, s223, s234-235 — attributed to the late 11th century via a letter of Anne of Russia (s235)"
definition = "ˌe → ˌə / _ ([+consonantal])? [+syllabic]"

[eof_countertonic_schwa_reverts_before_palatal]
time = 1000
name = "secondary-stressed schwa reverts to e before a palatal consonant"
description = "Pope s665"
definition = "ˌə → ˌe / _ [aperture: high, +front, +consonantal]"

[eof_countertonic_schwa_to_e_before_l_vowel]
time = 1000
name = "secondary-stressed schwa becomes ɛ before l + a non-round vowel"
description = "CORRECTION (pelerin, celle, celles); bleeds the following countertonic-e-to-schwa shift"
definition = "ˌə → ˌɛ / _ l [+syllabic, rounded: none]"

[eof_countertonic_schwa_to_e_before_r_nonlow]
time = 1000
name = "secondary-stressed schwa becomes e before r + a non-low vowel"
description = "CORRECTION (peril, derriere, Jerome, paresse)"
definition = "ˌə → ˌe / _ r [aperture: !low, +syllabic]"

[eof_initial_countertonic_schwa_to_e_before_strident]
time = 1000
name = "word-initial secondary-stressed schwa becomes e before a strident"
description = "CORRECTION (eveque(s), essai(s), essaim(s))"
definition = "ˌə → ˌe / # _ [+strident]"

[eof_schwa_to_e_in_closed_nasal_syllable]
time = 1000
name = "schwa becomes e in a closed nasal syllable, when not word-final"
description = "CORRECTION (parente, jouvencelle); excludes final syllables so verb -ent endings stay nasalized schwa"
definition = "ə → e / _ [+nasal] [nasal: none, +consonantal] ([-syllabic])* [+syllabic]"

[eof_e_rounds_to_o_before_j_after_voiced_labial]
time = 1000
name = "stressed e rounds early to o before j, after a voiced labial consonant"
definition = "ˈe → ˈo / [+labial, +voice] _ j"

[eof_final_ny_ejects_nasalized_j]
time = 1000
name = "word-final ɲ ejects a nasalized j after a tense vowel"
description = "Pope s405-406, called \"Early Old French\" by Pope (s406)"
definition = "∅ → j̃ / [advancement: atr, +syllabic] _ ɲ #"

[eof_nasal_uj_to_wi]
time = 1000
name = "the nasal diphthong ũj̃ becomes wĩ (syllabicity swap before a nasal)"
description = "Pope s670 (DiaCLEF source line 2648: {ũ j̃} > {w ĩ}), plus the front-round counterpart via the general yj→ɥi swap (rule 617) applied to the nasal ỹj̃ (juin ỹj̃ > ɥĩ > ɥɛ̃). The high rounded nucleus desyllabifies (back→w, front→ɥ) and the nasal yod becomes the nucleus ĩ, later lowered to ɛ̃. Must precede the ũj̃/ỹj̃ monophthongization."
definition = ["[+back, +rounded, aperture: high, +syllabic] j̃ → w [+syllabic]", "[+front, +rounded, aperture: high, +syllabic] j̃ → ɥ [+syllabic]"]

[eof_glide_before_intervocalic_ny]
time = 1000
name = "a glide develops between a stressed mid front vowel and intervocalic ɲ"
description = "Pope s407i — CORRECTION: also after ɛ, not just e"
definition = "∅ → j̃ / [aperture: mid, rounded: none, +syllabic, stress: !none] _ ɲ [+syllabic]"

[eof_second_nasalization_glide]
time = 1000
name = "j nasalizes after a mid front vowel, before a nasal (second nasalization)"
