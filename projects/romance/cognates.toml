# Romance cognate sets ‚ÄĒ seed data for the reconstruction experiment.
#
# Each entry is a gloss mapping a language code to that language's inherited reflex,
# in BROAD IPA. The task (see docs/reconstruction_sketch.md) is the inverse of Fortis's
# normal job: recover the common ancestor + the rules from these daughters alone.
#
# Language codes:
#   lat = Classical/Vulgar Latin ‚ÄĒ the ATTESTED ancestor. It is the benchmark answer
#         key, NOT an input to reconstruction: reconstruct from the daughters, then
#         score the result against `lat`. Hold it out when running the pipeline.
#   srd = Sardinian (conservative outlier ‚ÄĒ often preserves the ancestral state, so it
#         supplies directionality)
#   ita = Italian   spa = Spanish (Castilian)   por = Portuguese
#   fra = French    ron = Romanian
#
# Caveats: IPA is approximate/broad and should be verified before any serious use ‚ÄĒ the
# point here is the shape of the pipeline, not gold transcriptions. A daughter is OMITTED
# where the word was replaced or borrowed rather than inherited (e.g. Romanian 'hundred'
# is a Slavic loan), so the reconstructor must tolerate missing witnesses.

# k before a front vowel: Sardinian keeps /k/, the rest palatalize (t É / őł / s) ‚ÄĒ the
# classic pointer to ancestral *k + a conditioned change.
"hundred" = { lat = "ňąkentum", srd = "ňąk…õntu", ita = "ňąt É…õnto", spa = "ňąőłjento", por = "ňąsŠļĹtu", fra = "s…ĎŐÉ" }

# The -kt- cluster: retained tt (srd/ita), palatal t É (spa), vocalized j (por/fra), pt (ron).
"eight"   = { lat = "ňąokto",    srd = "ňą…Ētto",  ita = "ňą…Ētto",   spa = "ňąot Éo",   por = "ňąojtu", fra = "…•it", ron = "opt" }
"night"   = { lat = "ňąnoktem",  srd = "ňąn…Ētte", ita = "ňąn…Ētte",  spa = "ňąnot Ée",  por = "ňąnojt…®", fra = "n…•i", ron = "ňąnoŐĮapte" }
"milk"    = { lat = "ňąlaktem",  srd = "ňąlate",  ita = "ňąlatte",  spa = "ňąlet Ée",  por = "ňąlejt…®", fra = "l…õ",  ron = "ňąlapte" }
"done"    = { lat = "ňąfaktum",  srd = "ňąfattu", ita = "ňąfatto",  spa = "ňąet Éo",   por = "ňąfejtu", fra = "f…õ",  ron = "fapt" }

# Intervocalic lenition: ll ‚Üí v/…Ė/ é, k(w) ‚Üí g/‚ąÖ, etc.
"horse"   = { lat = "kaňąballum", srd = "ňąka…Ėňźu", ita = "kaňąvallo", spa = "kaňąő≤a éo", por = "k…źňąvalu", fra = " É…ôňąval", ron = "kal" }
"water"   = { lat = "ňąakwam",   srd = "ňąabba",  ita = "ňąakkwa",  spa = "ňąa…£wa",   por = "ňąa…°w…ź", fra = "o",   ron = "ňąap…ô" }

# kl- onset and -l- treatments.
"key"     = { lat = "ňąklawem",  srd = "ňąkrae",  ita = "ňąkjave",  spa = "ňą éaő≤e",   por = "ňą Éav…®", fra = "kle", ron = "ňąkeje" }
"flower"  = { lat = "ňąflorem",  srd = "ňąfr…Ēre", ita = "ňąfjore",  spa = "flo…ĺ",    por = "flo…ĺ",  fra = "flŇď Ā", ron = "ňąfloŐĮare" }

# f- retained everywhere except Spanish (f ‚Üí h ‚Üí ‚ąÖ); palatal  é from -li-.
"son"     = { lat = "ňąfilium",  ita = "ňąfi éňźo", spa = "ňąixo",    por = "ňąfi éu",   fra = "fis",  ron = "fiw" }

# Stable vowels / a clean conjugation stem ‚ÄĒ low-drama control sets.
"moon"    = { lat = "ňąlunam",   srd = "ňąluna",  ita = "ňąluna",   spa = "ňąluna",   por = "ňąlu.…ź", fra = "lyn", ron = "ňąlun…ô" }
"to sing" = { lat = "kanňątare", srd = "kanňątare", ita = "kanňątare", spa = "kanňąta…ĺ", por = "k…źŐÉňąta…ĺ", fra = " É…ĎŐÉňąte", ron = "k…®nňąta" }
