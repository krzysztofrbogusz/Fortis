# Laryngeal colouring, in one rule per direction via conditionals. The context is the
# laryngeal natural class — a guttural [+cons, +RTR] (= *h₁ χ, *h₂ ħ, *h₃ ʁʷ here).
# Two conditional labels then pick the colour from the laryngeal's own quality:
# label 1 fires next to a [+low] guttural (*h₂ ħ) and lowers *e to *a; label 2 fires
# next to a [+rounded] guttural (*h₃ ʁʷ) and backs/rounds *e to *o. *h₁ (χ) is neither
# [+low] nor [+rounded], so neither label fires and *e is left alone — its neutrality
# falls out. A merge result keeps a stressed /e/'s stress; the target *e is the mid
# front vowel [+syll, -cons, +front, !+aperture]: -cons excludes syllabic consonants
# (r̩, l̩, …) and !+aperture excludes *i/*a (both [+aperture]).
# Two rules, not one: the notation can't put the laryngeal on "either" side at once.
[laryngeal_colouring_after]
time = -2000
name = "Laryngeal colouring after a laryngeal"
description = "*h₂e > *h₂a, *h₃e > *h₃o (h₁ leaves e)"
definition = "[+syll, -cons, +front, !+aperture] → [<1: low: 1>, <1: aperture: 1>, <1: RTR: 1>, <1: ATR: none>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / [+cons, +RTR, <1: +low>, <2: +rounded>] _"

[laryngeal_colouring_before]
time = -2000
name = "Laryngeal colouring before a laryngeal"
description = "*eh₂ > *ah₂, *eh₃ > *oh₃"
definition = "[+syll, -cons, +front, !+aperture] → [<1: low: 1>, <1: aperture: 1>, <1: RTR: 1>, <1: ATR: none>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / _ [+cons, +RTR, <1: +low>, <2: +rounded>]"

[centumization]
time = -2000
name = "Centumization"
description = "Merging of PIE 'palatovelar' and 'velar' plosives"
definition = "[+cons, -sonorant, +back, +front] → [front: none]"

[u_epenthesis]
time = -2000
name = "'u' epenthesis"
description = "Epenthesis of /u/ before the syllabic sonorants"
definition = "∅ [+cons, +syll] → u [-syll]"

# A dental stop + epenthetic s + dental stop collapses to ss (*TsT > ss): the dental
# stops ([+cons,-continuant,+anterior,-sonorant], i.e. t/d) become s, the span
# shrinking 3→2. The result is letters (replacement path) so the lengths may differ.
[dental_cluster]
time = -2000
name = "Dental cluster simplification"
description = "*TsT > ss — *wid-tós (*widstos) > *wissós 'certain'"
definition = "[+cons, -continuant, +anterior, -sonorant] s [+cons, -continuant, +anterior, -sonorant] → s s"

# A geminate is one consonant doubled, so match it as `1=[+cons] @1` (capture, then
# the same consonant again) — not `[+cons]{2}`, which is any two consonants AND whose
# single quantified element can't pair with the two-element result. The first copy
# stays ([+cons] is a no-op merge), the second is deleted (∅); counts match, 2:2.
[geminate_shortening]
time = -2000
name = "Geminate shortening"
description = "A geminate shortens after a consonant or a long vowel"
definition = "1=[+cons] @1 → [+cons] ∅ / ([+cons]|[length: long]) _"

[overlong_vowels]
time = -2000
name = "Overlong vowels creation"
description = "Word-final long vowels are lengthened to 'overlong' vowels"
definition = "[length: long]# → [length: overlong]"

[loss_of_initial_laryngeals]
time = -2000
name = "Loss of initial laryngeals"
description = "Word-initial laryngeals are lost before a consonant"
definition = "#[+cons, +RTR][+cons] → ∅[+cons]"

[cowgills_law]
time = -2000
name = "Cowgill's law"
description = "*/h₃/ (and possibly */h₂/) is strengthened to */g/ between a sonorant and */w/"
definition = "ʁʷ → g / [+son] _ w"

# Post-vocalic loss runs *before* pre-vocalic loss so that an intervocalic laryngeal
# lengthens its preceding vowel (VHV > VːV) instead of being deleted pre-vocalically.
# Only a laryngeal with no preceding vowel (#HV, CHV) then falls through to the
# pre-vocalic rule.
[loss_of_laryngeals_after_vowels]
time = -2000
name = "Loss of laryngeals after vowels"
description = "Laryngeals are lost after vowels but lengthen the preceding vowel"
definition = "[+syll, -cons] [+cons, +RTR] → [+syll, -cons, length: long] ∅"

[loss_of_laryngeals_before_vowels]
time = -2000
name = "Loss of laryngeals before vowels"
description = "Laryngeals are lost before vowels — *h₁ésti 'is' > *ésti > *isti"
definition = "[+cons, +RTR][+syll, -cons] → ∅[+syll, -cons]"

# The long vowel left by post-vocalic laryngeal loss then absorbs a following short
# vowel in hiatus: Vː V > V̂. The overlong takes the long first vowel's quality (the
# merge keeps it, and any stress); the short second vowel is deleted. The first must
# be [length: long], so only laryngeal-lengthened hiatus contracts — *-oHom (> *oːom)
# > *-ôm; *-eh₂es (> *aːas) > *-âs.
[vowel_contraction]
time = -2000
name = "Vowel contraction in hiatus"
description = "A long vowel absorbs a following short vowel into an overlong — *-oHom > *-ôm"
definition = "[+syll, -cons, length: long] [+syll, -cons] → [length: overlong] ∅"

[laryngeal_vocalization]
time = -2000
name = "Vocalisation of remaining laryngeals"
description = "Vocalisation of remaining laryngeals"
definition = "[+cons, +RTR] → ə"

[velar_labialization]
time = -2000
name = "Velar labialization"
description = "Velars are labialised by following */w/, which is deleted"
definition = "[+bk, +hi] w → [+rounded] ∅ "

[labiovelar_delabialization]
time = -2000
name = "Labiovelar delabialization"
description = "Labiovelars are delabialised next to */u/ (or */un/) or before */t/"
definition = "[+bk, +hi, +rnd, -son] → [rnd: none] / _ (u|t)"

[final_non_high_short_vowel_loss]
time = -1000
name = "Word-final non-high short vowel loss"
description = "Word-final non-high short vowels are lost, along with preceding /j/ or /w/ (single syllables not affected)"
definition = [
    "[+syll] → [stress: primary] / _ [-syll]* [+syll, stress: primary, -cons, !+high, length: short] #",
    "j?w?[+syll, -cons, !+high, length: short] → ∅ / [+syll] []* _ #"
]

[grimms_law]
time = -1000
name = "Grimm's law"
description = "Chain shift of the three series of plosives. Voiced plosives had already been devoiced before a voiceless obstruent prior to this stage."
definition = [
    # Prerequisite
    "[-son, -cont, +voice] → [-voice] / _ [-son, -voice]",
    "[-son, -cont, -voice] → [+cont] // [-son, -voice] _", # p t k → ɸ θ x (except after obstruents)
    "[-son, -cont, +voice, glottal_aperture: neutral] → [-voice]", # b d g → p t k
    "[-son, -cont, +voice, glottal_aperture: spread] → [glottal_aperture: neutral, tension: neutral]", # bʱ dʱ gʱ → b d g
]

[verners_law]
time = -1000
name = "Verner's law"
description = "Voiceless fricatives are voiced when preceded by an unaccented vowel, including cases where the vowel and fricative are separated by a sonorant (n, m, r, l, j, w)"
definition = "[-son, +cont, -voice] → [+vc] / [+syll, stress: none] [+son, -syll]? _ "

[stress_change]
time = -1000
name = "Stress change to first syllable"
description = "All words become stressed on their first syllable. The PIE contrastive accent is lost, phonemicising the voicing distinction created by Verner's law"
definition = [
    "[+syll] → [stress: primary] / # [-syll]* _ []* [+syll, stress: primary]",
    "[+syll] → [stress: none] / [+syll] []* _",
]

[word_initial_gw_to_b]
time = -1000
name = "Word-initial */gʷ/ > */b/"
description = "Word-initial */gʷ/ > */b/"
definition = "gʷ → b / # _"

[unstressed_owo_to_long_o]
time = -1000
name = "Unstressed */owo/ > */oː/"
description = "Unstressed */owo/ > */oː/"
definition = "[+syll, +bk, length: short, stress: none] w [+syll, +bk, length: short, stress: none] → oː"

[unstressed_ew_to_ow_before_consonant_or_finally]
time = -1000
name = "Unstressed */ew/ > */ow/ before a consonant or word-finally"
description = "Unstressed */ew/ > */ow/ before a consonant or word-finally"
definition = "[+syll, !hi, +fr, length: short, stress: none] w → ow / _ ([-syll]|#)"

[unstressed_e_to_i_except_before_r]
time = -1000
name = "Unstressed */e/ > */i/ except before */r/"
description = "Unstressed */e/ > */i/ except before */r/. Unstressed */ej/ contracts to */iː/"
definition = [
    "[+syll, !hi, +fr, length: short, stress: none] → i // _ r",
    "[+syll, !hi, +fr, length: short, stress: none]j → iː // _ r"
]

[unstressed_ji_to_i]
time = -1000
name = "Unstressed */ji/ > */i/"
description = "Unstressed */ji/ > */i/"
definition = [
    "[+syll, +hi, +fr, length: short, stress: none]j[+syll, +hi, +fr, length: short, stress: none]  → iː",
    "j[+syll, +hi, +fr, length: short, stress: none] → i",

]

[non_high_back_merger]
time = -1000
name = "Merging of non-high back vowels"
description = "Merging of non-high back vowels"
definition = "([+syll, !hi, !fr, ATR] |[+syll, !hi, !fr, RTR]) → [hi: none, +lo, fr:none, +bk, ATR:none, +RTR, rnd: none]"

[final_m_to_n]
time = 0
name = "Word-final */m/ > */n/"
description = "Word-final */m/ > */n/"
definition = "m → n / _#"

[m_to_n_before_t_d]
time = 0
name = "*/m/ > */n/ before */t/, */d/, */θ̠/, */ð̠/"
description = "*/m/ > */n/ before */t/, */d/, */θ̠/, */ð̠/"
definition = "m → n / _ (t | d | θ̠ | ð̠)"

[final_n_loss]
time = 0
name = "Final /n/ loss"
description = "Word-final */n/ is lost after unstressed syllables, and the preceding vowel is nasalised"
definition = "[+syll, stress:none] n → [+nas] ∅ / _#"

[lowering_of_nasal_long_e]
time = 0
name = "Lowering of nasal */ẽː/ to */ɑ̃ː/"
description = "Lowering of nasal */ẽː/ to */ɑ̃ː/"
definition = "[+syll, !hi, +fr, length: long, nasal] → [hi: none, +lo, fr: none, +bk, ATR:none, +RTR, rnd: none]"

[schwa_elimination]
time = 0
name = "Elimination of */ə/"
description = "Unstressed */ə/ is lost between consonants; */ə/ > */ɑ/ elsewhere"
definition = [
    "[+syll, !hi, !lo, !fr, !bk, stress: none] → ∅ / _ [-syll]",
    "[+syll, !hi, !lo, !fr, !bk] → ɑ"
]

[assimilation_of_sonorants]
time = 0
name = "Assimilation of sonorants"
description = "Assimilation of sonorants"
definition = [
    "1=n w → @1 @1",     # nw > nn
    "1=l n → @1 @1",     # ln > ll
    "z → @1 / _ 1=m",    # zm > mm
]

[final_t_loss]
time = 0
name = "Final /t/ loss"
description = "Loss of word-final */t/ after unstressed syllables"
definition = "[+syll, stress:none][-syll]*t → [+syll, stress:none][-syll]*∅ / _# "

[gw_to_w]
time = 0
name = "*/gʷ/ > */w/"
description = "*/gʷ/ > */w/"
definition = "gʷ → w"

[long_a_raising]
time = 0
name = "Long /ɑ/ raising"
description = "*/ɑː/ > */ɔː/ "
definition = "[hi: none, +lo, fr:none, +bk, ATR:none, +RTR, !length: short] → [aperture: none, rnd]"

[early_i_mutation]
time = 0
name = "Early i-mutation"
description = "*/e/ > */i/ before */i j/ in the same or next syllable; also eliminates */ei/ > */iː/"
definition = [
    "[+syll, -cons, +front, !+aperture] → [+high] / _ [-syll]* [+high, +front]",   # e > i / _ (C) {i,j}
    "[+syll, +high, +front] [+syll, +high, +front] → [length: long] ∅",            # ii > iː
]

[e_to_i_before_syllable_final_nasal]
time = 0
application = "right_to_left"
name = "/e/ to /i/ before a syllable-final nasal"
description = "/e/ to /i/ before a syllable-final nasal"
definition = "e → i / _ [+nas]$"

[intervocalic_j_loss]
time = 0
name = "Loss of intervocalic *j"
description = "*/j/ is lost between vowels except after *i* (and, automatically, after *w*). The two vowels then contract — same quality to a long vowel, otherwise a diphthong."
definition = [
    "j → ∅ / [+syll] _ [+syll] // [+syll, +high, +front] _",   # j-loss (kept after i; w handled by the context)
    "[+syll, +low] [+syll, +low] → [length: long] ∅",          # aa > aː  (same quality, e.g. aja > stānti)
    "[+syll, +high, stress: none] → [-syll] / [+syll] _",       # Vi, Vu > diphthong  (offglide)
]

# ═══════════════════════════════════════════════════════════════════════════
# Common Germanic → West Germanic  (Index Diachronica §17.7.2)
# Changes below are cited by Index Diachronica section number — one source of several.
# ═══════════════════════════════════════════════════════════════════════════

# §17.7  aː → oː: the long low vowel (older *ā/*ǣ) rounds and backs to */oː/ — the
# Proto-Germanic change that gives *mōdēr 'mother' its /oː/ (> Modern /ʌ/).
[long_a_to_long_o]
time = 160
name = "*/aː/ > */oː/"
description = "*maːder > *moːder 'mother'"
definition = "[+syll, +low, length: long] → [back, rounded, labial, ATR, front: none, aperture: none, low: none, RTR: none]"

# Index Diachronica §17.7.2  β ð ɣ → b d ɡ / {#, ˈV}_ : the voiced fricatives harden
# to stops word-initially (and *ð broadly, after a vowel); the bilabial/velar fricatives
# stay fricative medially, surfacing as /v w/. OE *fæder already has /d/ — the /ð/ of
# Modern 'father' is a separate, much later change. The voiceless *ɸ labiodentalises to f.
[fricative_developments]
time = 200
name = "West Germanic hardening / labiodentalisation of the fricatives"
description = "*/ð/ > */d/ after a vowel; initial */β ɣ/ > */b ɡ/, medial > */v w/; */ɸ/ > */f/"
definition = [
    "ð̠ → d / [+son] _",   # letter identity: matches ð̠ only, no longer the strident z
    "β → b / # _",
    "ɣ → g / # _",
    "ɸ → f",               # letter identity: matches ɸ only, no longer the labiovelar xʷ
    "β → v",
    "ɣ → w / [+syll] _",
]

# §17.7.2.1  VN → Ṽː / _F: a nasal drops before a (voiceless) fricative, lengthening
# and nasalising the vowel — what gives English its long vowel in *tooth* and *goose*.
[nasal_spirant_law]
time = 200
name = "Ingvaeonic nasal spirant law  (VN > Ṽː / _F)"
description = "*ɑnθ > *ɑ̃ːθ ('tooth'), *gans > *gɑ̃ːs ('goose'), *xunθ > *xũːθ — Index Diachronica §17.7.2.1"
definition = "[+syll] [+nasal, -syll] [-son, +cont, -voice] → [length: long, +nasal] ∅ [-son, +cont, -voice]"

# §17.7.2.1.1  ɑ̃ː → õː, then V[+nas] → V[-nas]: the long nasal */ɑ̃ː/ rounds and the
# long nasal vowels denasalise.
[nasal_long_vowel_development]
time = 200
name = "Development of the long nasal vowels"
description = "*/ɑ̃ː/ > */õː/ > */oː/; the long nasal vowels denasalise — Index Diachronica §17.7.2.1.1"
definition = [
    "[+syll, +low, +nasal, !length: short] → [back, rounded, labial, ATR, front: none, aperture: none, low: none, RTR: none]",
    "[+syll, +nasal] → [nasal: none]",
]

# §17.7.2  z → {r, ∅}: rhotacism medially, loss word-finally.
[final_z_loss]
time = 250
name = "Loss of word-final */z/"
description = "*/z/ > ∅ / _# — *wurmiz > *wurmi"
definition = "z → ∅ / _ #"

[rhotacism]
time = 250
name = "Rhotacism */z/ > */r/"
description = "Remaining (medial) */z/ > */r/"
definition = "z → r"

# §17.7.2  C → Cː / _j (! C = r): West Germanic gemination — a consonant doubles
# before */j/. *bidjan > *biddjan, *midjaz > *middjaz.
[west_germanic_gemination]
time = 300
name = "West Germanic gemination before */j/"
description = "A non-*/r/ consonant geminates before */j/ — *midjaz > *middjaz 'middle'"
definition = "1=[-syll, -sonorant] → @1 @1 / _ j"

# §17.7.2  i u → e o / _%{a,o}: a-mutation lowers a high vowel when a non-high back
# vowel stands in the next syllable.
[a_mutation]
time = 300
name = "a-mutation */i u/ > */e o/"
description = "*/i u/ lower to */e o/ before a non-high back vowel in the next syllable, but not before a consonant cluster (so *fullaz and *wulfaz keep their /u/ — 'full', 'wolf')"
definition = "[+syll, +high, +back] → [aperture: none, high: none] / _ [-syll]* [+syll, !high, +back] // _ [-syll] [-syll]"

# §17.7.2  oː → uː / _#: word-final */oː/ raises to */uː/.
[final_long_o_raising]
time = 300
name = "Word-final */oː/ > */uː/"
description = "*/oː/ > */uː/ / _#"
definition = "[+syll, +back, +rounded, ATR, !high, length: long] → [aperture, high] / _ #"

# The */j/ that triggered West Germanic gemination is itself lost after the geminate it
# made — *bidjan > *biddjan > *biddan 'bid', *midjaz > *middjaz > *midd 'middle'.
[post_geminate_j_loss]
time = 350
name = "Loss of */j/ after a geminate"
description = "*/j/ > ∅ after a doubled consonant"
definition = "j → ∅ / 1=[-syll] @1 _"

# ═══════════════════════════════════════════════════════════════════════════
# West Germanic → Anglo-Frisian → Old English  (Index Diachronica §17.7.2.1, §17.7.2.1.1)
# ═══════════════════════════════════════════════════════════════════════════

# §17.7.2.1  i-umlaut (i-mutation): a low/back vowel fronts and raises before */i/ or */j/
# in the next syllable — the change behind 'guest', 'men', 'feet'. (Here the commonest
# case, */ɑ a/ > /e/.) It must fire *before* the triggering */i j/ is apocopated below.
[i_umlaut]
time = 450
name = "i-umlaut (i-mutation)  */ɑ/ > */e/ / _Ci"
description = "*/ɑ a/ > */e/ before */i j/ in the next syllable — *gastiz > *gestiz 'guest'"
definition = "[+syll, +low] → [front, ATR, back: none, aperture: none, low: none, RTR: none] / _ [-syll]* (j | [+syll, +high, +front])"

# §17.7.2.1  h → ∅ / V_V: intervocalic */h/ (the voiceless velar fricative *x) is lost —
# *tehun > *teun 'ten', *slahan > *slean 'slay'.
[intervocalic_h_loss]
time = 470
name = "Loss of intervocalic */h/  (h > ∅ / V_V)"
description = "*tehun > *teun 'ten'"
definition = "[-son, +cont, -voice, +back, +high] → ∅ / [+syll] _ [+syll]"

# The velar fricative */x/ becomes a stop before */s/ — the */xs/ of *ahsō surfaces as the
# /ks/ written ⟨x⟩ in 'axle', 'ox', 'six'.
[x_to_k_before_s]
time = 480
name = "*/x/ > */k/ before */s/"
description = "*ahsl > *aksl 'axle'"
definition = "[-son, +cont, -voice, +back, +high] → [-cont] / _ s"

# §17.7.2.1  {i,u} → ∅ / _# (! after a light syllable): final high vowels are lost,
# and with them the worn-down case endings. (Here, broadened to the nominative *-s
# and a final unstressed short vowel — the apocope that leaves *full, *wurm.)
[final_s_loss]
time = 500
name = "Loss of the final nominative */-s/"
description = "Word-final */s/ is lost after an unstressed vowel — *fullas > *fulla"
definition = "s → ∅ / [+syll, stress: none] _ #"

[final_short_vowel_apocope]
time = 500
name = "Apocope of final unstressed short vowels"
description = "A word-final unstressed short vowel is lost after another syllable — *fulla > *full, *wurmi > *wurm, *toːθu > *toːθ"
definition = "[+syll, stress: none, length: short] → ∅ / [+syll] [-syll]* _ #"

# */m/ > */n/ before a dental stop — completing in Old English an assimilation begun in
# Proto-Germanic (cf. the earlier *m > *n before *t/*d).
[m_to_n_before_dental]
time = 550
name = "*/m/ > */n/ before a dental"
description = "*samd > *sand 'sand'"
definition = "m → n / _ [+cons, +anterior, -son, -cont]"

# Anglo-Frisian brightening: the short low vowel fronts to */æ/, except when a
# back vowel follows in the next syllable (which keeps it back — a-restoration).
[anglo_frisian_brightening]
time = 600
name = "Anglo-Frisian brightening */ɑ/ > */æ/"
description = "*/ɑ a/ > */æ/ except before a back vowel in the next syllable — *θɑt > *θæt 'that', *sand > *sænd"
definition = "[+syll, +low, length: short] → [front, ATR, back: none, RTR: none] // _ [-syll]* [+syll, +back]"

# ═══════════════════════════════════════════════════════════════════════════
# Old English → Midlands Middle English  (Index Diachronica §17.7.2.1.3)
# ═══════════════════════════════════════════════════════════════════════════

# §17.7.2.1.3  {e,ɑ,o} → ə → ∅ / _#: the unstressed vowels weaken to */ə/ (here every
# unstressed vowel, the standard Middle English reduction), and a final */ə/ is then
# lost — the silent final -e of English spelling.
[unstressed_to_schwa]
time = 1100
name = "Reduction of unstressed vowels to */ə/"
description = "Every unstressed vowel reduces to */ə/ — *fadeːr > *fadər 'father'"
definition = "[+syll, stress: none] → [front: none, back: none, aperture: none, labial: none, advancement: none, nasal: none, length: short]"

# A schwa in hiatus — directly after the stressed vowel — is absorbed: *teən > *ten 'ten'.
[hiatus_schwa_loss]
time = 1150
name = "Loss of */ə/ in hiatus"
description = "*teən > *ten 'ten'"
definition = "ə → ∅ / [+syll] _ [-syll]"

[final_schwa_loss]
time = 1400
name = "Loss of final */ə/"
description = "Word-final */ə/ is lost — the silent final -e of English spelling"
definition = "ə → ∅ / _ #"

# ═══════════════════════════════════════════════════════════════════════════
# Midlands Middle English → Early Modern English  (Index Diachronica §17.7.2.1.4)
# ═══════════════════════════════════════════════════════════════════════════

# The Great Vowel Shift. Index Diachronica §17.7.2.1.4 records the late steps
# (əɪ əʊ → aɪ aʊ; eː oː → eɪ oʊ); the centring of */iː uː/ and the one-step raising
# of the long mid vowels that precede them are the standard account. Ordered top-down
# so each step feeds the next without merging — the high vowels centre *first*, so the
# mid vowels raising into their place do not follow them up the ladder.
[great_vowel_shift]
time = 1500
name = "The Great Vowel Shift"
description = "*/iː uː/ centre to */əɪ əʊ/ then lower to /aɪ aʊ/; the long mid vowels each raise one step (eː→iː, oː→uː, ɛː→eː, ɔː→oː); */aː/ fronts and raises — Index Diachronica §17.7.2.1.4"
definition = [
    "[+syll, +high, +front, length: long] → ə j",                                  # iː → əɪ
    "[+syll, +high, +back, +rounded, length: long] → ə w",                         # uː → əʊ
    "[+syll, +front, ATR, !high, !low, length: long] → [aperture, high]",          # eː → iː
    "[+syll, +back, +rounded, RTR, length: long] → [ATR, RTR: none]",              # ɔː → oː (before oː→uː: ME long ō reaches uː)
    "[+syll, +back, +rounded, ATR, !high, !low, length: long] → [aperture, high]", # oː → uː
    "[+syll, +low, length: long] → [front, ATR, aperture: none, low: none, back: none, RTR: none]", # aː → (ɛː >) eː
    "ə j → a j",                                                                    # əɪ → aɪ
    "ə w → a w",                                                                    # əʊ → aʊ
]

# Old English *hw (< Proto-Germanic *xʷ) > /w/ in most words — 'what', 'wheel' (only
# 'who/whose/whom' keep /h/, before /uː/).
[hw_to_w]
time = 1550
name = "*/hʷ/ > */w/"
description = "*xʷat > *wat 'what', *xʷeol > *weol 'wheel'"
definition = "xʷ → w"

# The labiovelar stop */kʷ/ surfaces as the cluster /kw/ — the ⟨qu⟩ of 'quick', 'queen'
# (and reduces to /k/ word-finally).
[labiovelar_kw]
time = 1300
name = "*/kʷ/ > /kw/"
description = "*kʷikʷ > *kwik 'quick'"
definition = ["kʷ → k / _ ([-syll] | #)", "kʷ → k w"]

# A stressed-syllable */d/ fricates to /ð/ before */ə(r)/ — the late change behind
# 'father', 'mother', 'gather', 'weather' (Old English still had /d/: *fæder).
[intervocalic_d_to_eth]
time = 1700
name = "*/d/ > */ð/ before */ər/"
description = "*fadər > *faðər 'father', *moːdər > *moːðər 'mother'"
definition = "d → ð̠ / [+syll, stress: primary] _ ə"

# §17.7.2.1.4  a → æ (else): the short low front vowel that escaped earlier backing
# fronts to the Modern English TRAP vowel — *appl > *æppl 'apple'.
[trap_fronting]
time = 1750
name = "*/a/ > */æ/"
description = "Short */a/ > */æ/ — *appl > *æppl 'apple'"
definition = "[+syll, +low, +front, length: short] → [ATR, RTR: none]"

# A short low vowel after /w/ backs — the "wa" of what, want, wash, swan. Here to the
# unrounded /ʌ/. *wæt > *wʌt 'what'.
[w_backing]
time = 1760
name = "*/a/ > */ʌ/ after /w/"
description = "*wæt > *wʌt 'what'"
definition = "[+syll, +low] → [back, RTR, front: none, ATR: none, low: none, aperture: none] / w _"

# §17.7.2.1.5  In a rhotic (e.g. General American) accent, an unstressed */ə/ + */r/
# coalesces into the r-coloured vowel */ɚ/ — *faðər > *faðɚ ('father', 'mother', 'over').
# §17.7.2.1.4  A stressed vowel before */r/ + a consonant (or word-end) loses its quality
# and r-colours to the NURSE vowel /ɝ/ — *werk > *wɝk 'work', *wʌrm > *wɝm 'worm'. (Same
# r-coloured central vowel as unstressed /ɚ/ below, written ə˞; only the stress differs.)
[nurse_merger]
time = 1850
name = "Pre-/r/ NURSE merger > /ɝ/"
description = "*werk > *wɝk 'work', *wʌrm > *wɝm 'worm'"
definition = "[+syll, stress: primary] r → [front: none, back: none, aperture: none, labial: none, advancement: none, +retroflex] ∅ / _ ([-syll] | #)"

[r_colouring]
time = 1900
name = "Unstressed */ər/ > /ɚ/"
description = "*faðer > *faðɚ 'father' — the unstressed vowel takes the r-colouring (retroflex), the */r/ dropping"
definition = "[+syll, stress: none] r → [+retroflex] ∅"

# The Proto-Germanic apico-dental fricatives surface as the plain dental */θ ð/ of English.
[dental_fricatives_plain]
time = 1950
name = "*/θ̠ ð̠/ > */θ ð/"
description = "The dental fricatives lose their retraction — *tuːθ̠ > tuːθ, *fɑð̠ɚ > fɑðɚ"
definition = ["ð̠ → ð", "θ̠ → θ"]  # letters now match by identity, so these no longer catch z/s

# A nasal before a velar fricative assimilates to */ŋ/, the fricative dropping — *juŋɣ > *juŋ.
[velar_nasal]
time = 1450
name = "*/nɣ/ > */ŋ/"
description = "*juŋɣ > *juŋ 'young'"
definition = "[+nasal, -syll] [-son, +cont, +back, +high] → ŋ ∅"

# §17.7.2.1.4  ʊ → ʌ (! _l): the FOOT–STRUT split. A short back-rounded vowel in a closed
# syllable unrounds to */ʌ/, except before /l/ — *us > *ʌs, *juŋ > *jʌŋ ('full', 'over' keep
# their rounding: 'full' is before /l/, 'over' has its vowel in an open syllable).
[foot_strut_split]
time = 1650
name = "FOOT–STRUT split  ʊ > ʌ"
description = "Short */u o/ > */ʌ/ in a closed syllable, except before /l/"
definition = "[+syll, +back, +rounded, length: short] → [rounded: none, labial: none, high: none, aperture: none, ATR: none, RTR] / _ [-syll] ([-syll] | #) // _ [+lateral]"

# The surviving short high vowels lax — ME */i u/ > /ɪ ʊ/ (KIT, FOOT). The long high vowels
# have already diphthongised in the Vowel Shift, so only short */i u/ remain to lax.
[short_high_laxing]
time = 1700
name = "Short */i u/ > /ɪ ʊ/"
description = "*kwik > *kwɪk 'quick', *full > *fʊll 'full', *is > ɪs, *in > ɪn"
definition = "[+syll, +high, length: short] → [RTR, ATR: none]"

# ═══════════════════════════════════════════════════════════════════════════
# Leveling and sporadic changes — word-scoped, one word at a time.
# ═══════════════════════════════════════════════════════════════════════════

[wolf_irregular_f]
time = 250
words = ["wolf"]
name = "*/xʷ/ > */f/ in 'wolf'"
description = "Sporadic: *wulxʷaz irregularly shows *f, not the regular labiovelar reflex — *wulfaz"
definition = "xʷ → f"

# Analogical: the masculine *þrīz takes the front vowel of the neuter *þrijô, so the
# Great Vowel Shift later raises it to /iː/ ('three') rather than diphthongising to /θraj/.
[three_leveling]
time = 550
words = ["three"]
name = "Leveling of 'three' to the *þrij- stem"
description = "*/iː/ > */eː/ in *þrīz, feeding the eː→iː step of the shift"
definition = "[+syll, +high, +front, length: long] → [aperture: none, high: none]"

[that_initial_voicing]
time = 1300
words = ["that"]
name = "Voicing of initial */θ̠/ in 'that'"
description = "Sporadic: the unstressed demonstrative voices its initial fricative — *θæt > ðæt"
definition = "θ̠ → ð̠ / # _"

[is_final_t_loss]
time = 1300
words = ["is"]
name = "Loss of final */t/ in 'is'"
description = "Sporadic: the high-frequency copula sheds its final */t/ — *ist > is"
definition = "t → ∅ / _ #"

# The vowel of 'us' shortens (it is usually an unstressed clitic) before the Vowel Shift can
# diphthongise it; FOOT–STRUT then unrounds it. *ūs > *us > /ʌs/.
[us_clitic_shortening]
time = 1000
words = ["us"]
name = "Clitic shortening in 'us'"
description = "*ūs > *us"
definition = "[+syll] → [length: short]"

# 'mother' shortens its */oː/ early (trisyllabic shortening) and so escapes the Vowel Shift,
# joining the FOOT–STRUT class. *mōðer > /ˈmʌðər/.
[mother_trisyllabic_shortening]
time = 1000
words = ["mother"]
name = "Trisyllabic shortening + unrounding in 'mother'"
description = "*mōðer > *mʌðer"
definition = "[+syll, +back, +rounded, length: long] → [length: short, rounded: none, labial: none, high: none, aperture: none, ATR: none, RTR]"

[young_shortening]
time = 1000
words = ["young"]
name = "Vowel shortening in 'young'"
description = "*jūŋ > *juŋ (> FOOT–STRUT /jʌŋ/)"
definition = "[+syll] → [length: short]"

# 'night': OE *niht — the velar fricative palatalises and is lost, leaving the diphthong of
# the Great Vowel Shift, and the genitive *-s drops. *næxts > *najt /naɪt/.
[night_development]
time = 1800
words = ["night"]
name = "*x-loss + diphthong in 'night'"
description = "*næxts > *najt 'night'"
definition = ["[+syll] [-son, +cont, +back, +high] → a j", "s → ∅ / t _ #"]

# 'new': the */iw/ of OE *nīwe glides to /juː/, and the old */j/ ending is lost. *niwj > /njuː/.
[new_development]
time = 1800
words = ["new"]
name = "*/iw/ > /juː/ in 'new'"
description = "*niwj > *njuː 'new'"
definition = ["[+syll] w → j uː", "j → ∅ / _ #"]

# 'eight': OE *eahta — the *ɑɣ + the following diphthong collapse to the /eɪ/ of 'eight'.
[eight_development]
time = 1800
words = ["eight"]
name = "Monophthong/diphthong collapse in 'eight'"
description = "*ɑwtɑw > *ejt 'eight'"
definition = "[+syll] w t [+syll] w → e j t"

# 'wheel': OE *hwēol — the medial fricative is lost with compensatory lengthening of the
# vowel, which the Vowel Shift then raises. *xʷevl > *xʷeːl > /wiːl/.
[wheel_development]
time = 1000
words = ["wheel"]
name = "Compensatory lengthening in 'wheel'"
description = "*xʷeɣʷl > *xʷeːl 'wheel'"
definition = "[+syll] [-son, +cont, +back, +high] → [length: long] ∅"

# 'song': OE *song — the labiovelar that became *w restores the velar nasal. *sænw > *sæŋ.
[song_development]
time = 1800
words = ["song"]
name = "*/nw/ > */ŋ/ in 'song'"
description = "*sænw > *sɔŋ 'song'"
definition = ["n w → ŋ ∅", "[+syll] → ɔ / _ [+nasal, +back]"]

# 'snow': OE *snāw — the */aiw/ becomes the /oʊ/ diphthong of 'snow'. *snæjw > *snow.
[snow_development]
time = 1800
words = ["snow"]
name = "*/aiw/ > /oʊ/ in 'snow'"
description = "*snæjw > *snow 'snow'"
definition = "[+syll] j w → o w"

# 'am': the citation form keeps its full vowel (it is normally an unstressed clitic, which
# would reduce); the geminate from *esmi > *emmi simplifies. /æm/.
[am_development]
time = 1700
words = ["am"]
name = "Full vowel + degemination in 'am'"
description = "*emm > *æm 'am'"
definition = ["[+syll] → æ", "1=m @1 → m ∅"]

# §17.7.2.1.4  a → ɑ "in a few words, like father": the special backing of */æ/ in 'father'
# (and 'rather', 'lather'), before the r-colouring of the ending.
[father_lowering]
time = 1800
words = ["father"]
name = "*/æ/ > */ɑ/ in 'father'"
description = "*fæðer > *fɑðer 'father'"
definition = "[+syll, +low] → [back, front: none, RTR, ATR: none]"

# 'over': OE *ofer had a short /o/ that open-syllable lengthening and the Vowel Shift carry
# to the GOAT diphthong /oʊ/ (the OE-ā/ō outcome the general chain here collapses to /uː/).
[over_development]
time = 1850
words = ["over"]
name = "GOAT diphthong in 'over'"
description = "*ʊvər > *owvər 'over'"
definition = "[+syll, stress: primary] → o w"

# Modern English has no phonemic geminates: a doubled consonant simplifies. *midd > mid,
# *full > ful.
[degemination]
time = 1960
name = "Degemination"
description = "*midd > mid, *full > ful"
definition = "1=[-syll] @1 → @1 ∅"
